routing:
  default_route:
    mode: review_only
    agents: [codex]
    reason: unresolved_route_requires_review
  fallback_route:
    mode: review_only
    agents: [codex]
    reason: unresolved_route_requires_review
  rules:
    - id: readonly_lookup
      when:
        task_category: explain_code
      mode: single_agent
      agents: [hermes-internal]
      reason: read_only_analysis

    - id: technical_decomposition
      when:
        task_category: technical_decomposition
      mode: single_agent
      agents: [hermes-internal]
      reason: technical_translation_and_decomposition

    - id: small_test_generation
      when:
        task_category: tests
        risk_max: R1
      mode: single_agent
      agents: [deepseek-tui]
      reason: targeted_test_generation

    - id: standard_feature
      when:
        task_category: feature
        risk_level: R2
      mode: single_agent
      agents: [claude]
      reason: default_feature_implementation

    - id: code_maintenance
      when:
        task_category: code_maintenance
      mode: single_agent
      agents: [claude]
      reason: default_code_implementation

    - id: architecture_change
      when:
        task_category: architecture_change
      mode: pipeline
      agents: [hermes-internal, codex, claude, deepseek-tui]
      require_gate: review
      reason: architecture_runtime_change

    - id: high_risk_pipeline
      when:
        risk_level: R3
      mode: pipeline
      agents: [hermes-internal, codex, claude, deepseek-tui]
      require_gate: review
      reason: risk_escalation

    - id: production_or_destructive
      when:
        risk_level: R4
      mode: pipeline
      agents: [hermes-internal, codex, claude, ambrosini]
      require_gate: review
      requires_human_approval: true
      reason: production_or_destructive_requires_approval
